<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Website Cloner AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 600px;
      background: #1a1a2e;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    h1 {
      color: #fff;
      font-size: 28px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .subtitle {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      background: #16213e;
      border: 1px solid #444;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
    }
    input::placeholder {
      color: #666;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      background: #0f1729;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:hover { background: #5568d3; }
    button:disabled { background: #444; cursor: not-allowed; }
    .status {
      margin-top: 16px;
      padding: 12px;
      background: #16213e;
      border-radius: 6px;
      color: #aaa;
      font-size: 13px;
      min-height: 20px;
    }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .output-section {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #333;
    }
    .output-title {
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .code-block {
      background: #0f1729;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px;
      color: #4ade80;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      overflow-x: auto;
      max-height: 300px;
      overflow-y: auto;
      line-height: 1.4;
    }
    .download-btn {
      background: #10b981;
      margin-top: 16px;
    }
    .download-btn:hover { background: #059669; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #667eea;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ Website Cloner</h1>
    <p class="subtitle">Claude Vision analyse page → génère HTML clone</p>

    <form id="form" onsubmit="return false">
      <div class="form-group">
        <input type="url" id="url" placeholder="https://example.com" required>
      </div>
      <div class="form-group">
        <input type="password" id="apiKey" placeholder="sk-ant-..." required>
      </div>
      <button type="button" onclick="cloneWebsite()">
        <span id="btnText">Clone</span>
      </button>
    </form>

    <div id="status" class="status"></div>

    <div id="output" style="display:none" class="output-section">
      <div class="output-title">HTML Généré</div>
      <div class="code-block" id="code"></div>
      <button class="download-btn" onclick="downloadHtml()">⬇ Télécharge HTML</button>
    </div>
  </div>

  <script>
    let generatedHtml = '';

    async function cloneWebsite() {
      const url = document.getElementById('url').value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();
      const statusEl = document.getElementById('status');
      const btnEl = document.querySelector('button[type="button"]');
      const btnText = document.getElementById('btnText');

      if (!url || !apiKey) {
        statusEl.textContent = '❌ URL + clé API requis';
        statusEl.className = 'status error';
        return;
      }

      btnEl.disabled = true;
      btnText.innerHTML = '<span class="spinner"></span> Capture...';
      statusEl.textContent = 'Capture page...';
      statusEl.className = 'status';

      try {
        // Capture screenshot
        const screenshotUrl = `https://api.screenshotapi.net/capture?token=free&url=${encodeURIComponent(url)}&width=1280&height=720`;
        const imgRes = await fetch(screenshotUrl);
        if (!imgRes.ok) throw new Error('Screenshot API error');
        
        const blob = await imgRes.blob();
        const reader = new FileReader();
        
        reader.onload = async () => {
          const base64 = reader.result.split(',')[1];
          statusEl.textContent = 'Analyse avec Claude Vision...';

          try {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': apiKey,
              },
              body: JSON.stringify({
                model: 'claude-opus-4-6',
                max_tokens: 4000,
                messages: [{
                  role: 'user',
                  content: [{
                    type: 'image',
                    source: {
                      type: 'base64',
                      media_type: 'image/png',
                      data: base64
                    }
                  }, {
                    type: 'text',
                    text: 'Génère HTML pur qui clone ce design exactement. Retourne UNIQUEMENT du HTML valide, pas d\'explications. <!DOCTYPE html> complet avec <style> et contenu.'
                  }]
                }]
              })
            });

            const data = await response.json();
            if (data.error) {
              throw new Error(data.error.message);
            }

            generatedHtml = data.content[0].text;
            document.getElementById('code').textContent = generatedHtml.slice(0, 1000) + (generatedHtml.length > 1000 ? '\n...' : '');
            document.getElementById('output').style.display = 'block';
            statusEl.textContent = '✓ Clone prêt. Télécharge ou déploie.';
            statusEl.className = 'status success';
          } catch (err) {
            statusEl.textContent = `❌ Erreur: ${err.message}`;
            statusEl.className = 'status error';
          }

          btnEl.disabled = false;
          btnText.textContent = 'Clone';
        };

        reader.onerror = () => {
          statusEl.textContent = '❌ Erreur lecture image';
          statusEl.className = 'status error';
          btnEl.disabled = false;
          btnText.textContent = 'Clone';
        };

        reader.readAsDataURL(blob);
      } catch (err) {
        statusEl.textContent = `❌ ${err.message}`;
        statusEl.className = 'status error';
        btnEl.disabled = false;
        btnText.textContent = 'Clone';
      }
    }

    function downloadHtml() {
      const blob = new Blob([generatedHtml], { type: 'text/html' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'cloned-site.html';
      link.click();
    }
  </script>
</body>
</html>
